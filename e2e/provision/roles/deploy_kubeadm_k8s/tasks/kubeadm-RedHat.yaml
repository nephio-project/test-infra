- name: install kubelet kubeadm kubectl on {{ ansible_os_family }} system
  become: true
  block:
    - name: install iptables-legacy package
      ansible.builtin.package:
        name:
          - iptables-legacy

    - name: add k8s yum repository
      ansible.builtin.yum_repository:
        name: Kubernetes
        description: Kubernetes Repository
        baseurl: https://pkgs.k8s.io/core:/stable:/v{{ k8s_ver }}/rpm/
        enabled: yes
        gpgcheck: yes
        repo_gpgcheck: yes
        gpgkey: https://pkgs.k8s.io/core:/stable:/v{{ k8s_ver }}/rpm/repodata/repomd.xml.key
        #exclude: kubelet kubeadm kubectl

    - name: put SELinux in permissive mode
      ansible.posix.selinux:
        policy: targeted
        state: permissive

    - name: install kubelet kubeadm kubectl
      ansible.builtin.dnf:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present

    - name: disable swap 1/2
      become: true
      ansible.builtin.shell: swapoff -a

    - name: disable swap in fstab 2/2
      become: true
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
        replace: '# \1'

    - name: remove zram-generator-defaults package
      ansible.builtin.package:
        name: zram-generator-defaults
        state: absent
